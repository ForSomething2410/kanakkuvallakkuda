<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Data Table</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .table-container {
            background-color:black;
            border-radius: 12px;
            padding:7px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            font-size: 16px;
        }
        th {
            background-color:transparent;
            color: #ff8c42;
            font-weight: bold;
        }
        td {
            background-color:transparent;
            color: #ffffff;
        }
        tr:hover td {
            background-color: #3b2f60;
            transition: 0.3s ease;
        }
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            th, td {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<script type="text/javascript">
let uu = "https://picsum.photos/200/300/?blur=1";
document.body.style.background = `url('${uu}')`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundRepeat = "no-repeat";
</script>
    <div class="table-container">
        <h3 style="color: #ff8c42;">Frotu</h3>
        <center><h3 id="fsu" style="color: #ff8c42;"></h3></center>
        
        <table>
            <thead>
                <tr>
                    <th>Frotu</th>
                    <th>Frotu Date</th>
                    <th>From</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="famt">1080</td>
                    <td>13.8.24</td>
                    <td>Security OT</td>
                </tr>
                <tr>
                    <td class="famt">540</td>
                    <td>9.9.24</td>
                    <td>Security OT</td>
                </tr>
                
                <tr>
                <td class="famt">5</td>
                <td>2.10.24</td>
                <td>got from train</td>
                </tr>
                
                <tr>
                <td class="famt">100</td>
                <td>3.10.24</td>
                <td>Helped To B202 <br> GrandFather , <br> So Madam Give <br>100rs Gift.</td>
                </tr>
                
                <tr>
                <td class="famt">25</td>
                <td>5.10.24</td>
                <td>A402 Manjunath <br> Sir Give 25rs for <br> reciving Amzon <br>COD Order</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <script type="text/javascript">
    
    function famtC(){
    
    let fam=document.getElementsByClassName("famt");
    let fsum=0;
    for(let f=0;f<fam.length;f++){
       fsum+=parseInt(fam[f].innerHTML);
    
    }
    //alert(fsum);
    document.getElementById("fsu").innerHTML=`Total ${fsum}`;
    }
    
    famtC();
    
    </script>
</body>
</html>
