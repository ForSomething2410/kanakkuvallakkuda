<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Data Table</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .table-container {
            background-color: #1f1b24;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            font-size: 16px;
        }
        th {
            background-color: #272135;
            color: #ff8c42;
            font-weight: bold;
        }
        td {
            background-color: #2e294e;
            color: #ffffff;
            border-bottom: 1px solid #3b3b58;
        }
        tr:hover td {
            background-color: #3b2f60;
            transition: 0.3s ease;
        }
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            th, td {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="table-container">
        <h2 style="color: #ff8c42;">Frotu</h2>
        <table>
            <thead>
                <tr>
                    <th>Frotu</th>
                    <th>Frotu Date</th>
                    <th>From</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1080</td>
                    <td>13.8.24</td>
                    <td>Security OT</td>
                </tr>
                <tr>
                    <td>540</td>
                    <td>9.9.24</td>
                    <td>Security OT</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
